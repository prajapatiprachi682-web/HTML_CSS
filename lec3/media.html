<!DOCTYPE html>
<html>
    <head>
        <title>Div vs Span & Media Tags</title>
        <style>
            .box{
                background-color: lightblue;
                padding: 20px;
                margin-bottom: 20px;
                border: 2px solid blue;
            }

            .highlight{
                color: red;
                font-weight: bold;
                background-color: yellow;
            }

            img{
                width: 200px;
                border: 2px solid black;
            }

            video{
                width: 300px;
                border: 3px solid green;
            }

            audio{
                margin-top: 10px;
            }

            iframe{
                width: 300px;
                height: 200px;
                border: 2px solid red;
            }
        </style>
    </head>
    <body>
        <h2>DIV vs SPAN</h2>
        <div class="box">
            This is a DIV element.
            DIV poori line deta hai.
        </div>
        <p>
            This is a paragraph with 
            <span class="highlight">SPAN element</span>inside text.
        </p>
        <hr>
        <h2>Media Tags</h2>
        <h3>Image</h3>
        <img src="https://via.placeholder.com/200" alt="Sample Image">
        <br><br>
        <h3>Iframe</h3>
        <iframe src="https://www.wikipedia.org"></iframe>
    </body>
</html>
